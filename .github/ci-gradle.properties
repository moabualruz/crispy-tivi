# CI-specific Gradle properties. Copied to ~/.gradle/gradle.properties by
# the GitHub Actions workflow before running builds. Tames memory and
# disables unnecessary features on the CI runner.

org.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.welcome=never

# Fail the build on Kotlin/KMP warnings we normally tolerate locally
kotlin.incremental=false
