name: Build

# Manual trigger only — no auto-triggers on push or pull_request.
# Run via the "Actions" tab → Build → Run workflow.
on:
  workflow_dispatch:
    inputs:
      run_ios:
        description: "Also run the iOS framework job (requires macos runner)"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-android-web:
    name: JVM + Android + Web
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p $HOME/.gradle
          cp .github/ci-gradle.properties $HOME/.gradle/gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android + JVM + checks
        run: ./gradlew :app:android:assembleDebug build --scan --stacktrace

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-jvm
          path: |
            **/build/reports/**
            **/build/test-results/**

  ios:
    name: iOS framework
    runs-on: macos-latest
    timeout-minutes: 60
    # Only runs when the workflow_dispatch input asks for it AND the iOS
    # targets are wired into the conventions (phase B).
    if: ${{ github.event.inputs.run_ios == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Copy CI gradle.properties
        run: |
          mkdir -p $HOME/.gradle
          cp .github/ci-gradle.properties $HOME/.gradle/gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS framework
        run: ./gradlew :app:ios:linkDebugFrameworkIosSimulatorArm64 --scan --stacktrace

      - name: Upload iOS build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-ios
          path: |
            **/build/reports/**
