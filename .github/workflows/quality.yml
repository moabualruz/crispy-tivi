name: Code Quality
on:
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rice-guard
        run: curl -fsSL https://install.rice-guard.dev | sh
      - name: Scan
        run: rice-guard scan . --diff-only
        env:
          RICE_GUARD_FAIL_ON: high
