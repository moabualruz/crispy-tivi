# Manual release workflow — builds all platform artifacts and publishes GitHub Release.
# Trigger: workflow_dispatch only. No automatic releases on push.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0-beta.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.1"
  RUST_VERSION: "1.91.1"

jobs:
  # =================================================================
  # === Windows: MSIX + setup.exe ====================================
  # =================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: cd app/flutter && flutter pub get

      - name: Build Rust FFI
        run: cargo build -p crispy-ffi --release
        working-directory: rust

      - name: Build Flutter Windows
        run: cd app/flutter && flutter build windows --release

      - name: Create MSIX package
        run: dart run msix:create --version ${{ inputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        run: iscc /DAppVersion=${{ inputs.version }} scripts/inno_setup.iss

      - name: Rename artifacts
        shell: bash
        run: |
          mv build/windows/x64/runner/Release/CrispyTivi.msix \
            "CrispyTivi-${{ inputs.version }}.msix" 2>/dev/null || true
          mv build/windows/x64/runner/Release/*.msix \
            "CrispyTivi-${{ inputs.version }}.msix" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            Output/CrispyTivi-*-windows-setup.exe
            CrispyTivi-*.msix
          retention-days: 1

  # =================================================================
  # === macOS + iOS ==================================================
  # =================================================================
  build-macos-ios:
    name: Build macOS + iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: >-
            x86_64-apple-darwin,
            aarch64-apple-darwin,
            aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: cd app/flutter && flutter pub get

      # ── macOS ──
      - name: Build Rust for macOS
        run: bash scripts/build_rust.sh macos

      - name: Build Flutter macOS
        run: cd app/flutter && flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "CrispyTivi" \
            --window-size 600 400 \
            --app-drop-link 400 200 \
            --icon-size 100 \
            "CrispyTivi-${{ inputs.version }}.dmg" \
            "build/macos/Build/Products/Release/crispy_tivi.app"

      # ── iOS ──
      - name: Build Rust for iOS
        run: bash scripts/build_rust.sh ios

      - name: Build Flutter iOS (no codesign)
        run: cd app/flutter && flutter build ipa --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/CrispyTivi-${{ inputs.version }}.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: macos-ios-artifacts
          path: |
            CrispyTivi-*.dmg
            CrispyTivi-*.ipa
          retention-days: 1

  # =================================================================
  # === Linux + Android + Web ========================================
  # =================================================================
  build-linux-android-web:
    name: Build Linux + Android + Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev pkg-config \
            libmpv-dev libfuse2

      - run: cd app/flutter && flutter pub get

      # ── Linux ──
      - name: Build Rust FFI (Linux)
        run: cargo build -p crispy-ffi --release
        working-directory: rust

      - name: Build Flutter Linux
        run: cd app/flutter && flutter build linux --release

      - name: Create AppImage
        run: bash scripts/build_appimage.sh ${{ inputs.version }}

      - name: Create .deb package
        run: |
          PKG_DIR="crispy-tivi_${{ inputs.version }}_amd64"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/lib/crispy-tivi"
          mkdir -p "$PKG_DIR/usr/share/applications"
          mkdir -p "$PKG_DIR/usr/share/icons/hicolor/256x256/apps"

          cat > "$PKG_DIR/DEBIAN/control" << CTRL
          Package: crispy-tivi
          Version: ${{ inputs.version }}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libmpv1
          Maintainer: CrispyTivi <noreply@crispytivi.app>
          Description: Cross-platform media streaming application
           Supports IPTV, Jellyfin, Emby, and Plex.
          CTRL
          # Remove leading spaces from heredoc
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          cp -r app/flutter/build/linux/x64/release/bundle/* "$PKG_DIR/usr/lib/crispy-tivi/"

          cat > "$PKG_DIR/usr/bin/crispy-tivi" << 'BIN'
          #!/bin/bash
          exec /usr/lib/crispy-tivi/crispy_tivi "$@"
          BIN
          chmod +x "$PKG_DIR/usr/bin/crispy-tivi"

          if [ -f app/flutter/assets/icons/app_icon.png ]; then
            cp app/flutter/assets/icons/app_icon.png \
              "$PKG_DIR/usr/share/icons/hicolor/256x256/apps/crispy-tivi.png"
          fi

          cat > "$PKG_DIR/usr/share/applications/crispy-tivi.desktop" << DESKTOP
          [Desktop Entry]
          Type=Application
          Name=CrispyTivi
          Comment=Cross-platform media streaming
          Exec=/usr/bin/crispy-tivi
          Icon=crispy-tivi
          Terminal=false
          Categories=AudioVideo;Video;Player;
          DESKTOP

          dpkg-deb --build "$PKG_DIR"
          mv "${PKG_DIR}.deb" "CrispyTivi-${{ inputs.version }}-amd64.deb"

      # ── Android ──
      - name: Build Rust for Android
        run: bash scripts/build_rust.sh android

      - name: Build Android APK
        run: cd app/flutter && flutter build apk --release

      - name: Build Android AAB
        run: cd app/flutter && flutter build appbundle --release

      - name: Rename Android artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "CrispyTivi-${{ inputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "CrispyTivi-${{ inputs.version }}.aab"

      # ── Web ──
      - name: Build Web
        run: cd app/flutter && flutter build web --release

      - name: Zip web build
        run: |
          cd app/flutter/build/web
          zip -r "../../CrispyTivi-${{ inputs.version }}-web.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-android-web-artifacts
          path: |
            CrispyTivi-*.AppImage
            CrispyTivi-*-amd64.deb
            CrispyTivi-*.apk
            CrispyTivi-*.aab
            CrispyTivi-*-web.zip
          retention-days: 1

  # =================================================================
  # === Create GitHub Release ========================================
  # =================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos-ios, build-linux-android-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "CrispyTivi v${{ inputs.version }}" \
            --generate-notes \
            release-artifacts/*
