# CrispyTivi CI — Rust + Slint
# Manual trigger only. No push/PR builds.

name: CI

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.91.1"
  MPV_WIN_REPO: shinchiro/mpv-winbuild-cmake
  MPV_WIN_TAG: "20260307"
  MPV_DARWIN_REPO: media-kit/libmpv-darwin-build
  MPV_DARWIN_TAG: v0.6.3
  MPV_ANDROID_REPO: jarnedemeulemeester/libmpv-android
  MPV_ANDROID_TAG: v0.5.1

jobs:
  # =================================================================
  # === Download ALL libmpv deps once, shared cache ==================
  # =================================================================
  deps:
    name: Download Native Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache libmpv
        id: cache-mpv
        uses: actions/cache@v4
        with:
          path: third-party/mpv
          key: libmpv-${{ env.MPV_WIN_TAG }}-${{ env.MPV_DARWIN_TAG }}-${{ env.MPV_ANDROID_TAG }}

      - name: Download all libmpv archives
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          mkdir -p third-party/mpv/{windows-x64,windows-arm64,macos-universal,ios-arm64,android}

          echo "=== Windows x64 ==="
          gh release download ${{ env.MPV_WIN_TAG }} \
            --repo ${{ env.MPV_WIN_REPO }} \
            -p "mpv-dev-x86_64-${{ env.MPV_WIN_TAG }}-git-*.7z" \
            -D third-party/mpv/windows-x64/ --clobber

          echo "=== Windows ARM64 ==="
          gh release download ${{ env.MPV_WIN_TAG }} \
            --repo ${{ env.MPV_WIN_REPO }} \
            -p "mpv-dev-aarch64-${{ env.MPV_WIN_TAG }}-git-*.7z" \
            -D third-party/mpv/windows-arm64/ --clobber

          echo "=== macOS universal ==="
          gh release download ${{ env.MPV_DARWIN_TAG }} \
            --repo ${{ env.MPV_DARWIN_REPO }} \
            -p "libmpv-libs_${{ env.MPV_DARWIN_TAG }}_macos-universal-video-full.tar.gz" \
            -D third-party/mpv/macos-universal/ --clobber

          echo "=== iOS universal ==="
          gh release download ${{ env.MPV_DARWIN_TAG }} \
            --repo ${{ env.MPV_DARWIN_REPO }} \
            -p "libmpv-xcframeworks_${{ env.MPV_DARWIN_TAG }}_ios-universal-video-full.tar.gz" \
            -D third-party/mpv/ios-arm64/ --clobber

          echo "=== Android ==="
          gh release download ${{ env.MPV_ANDROID_TAG }} \
            --repo ${{ env.MPV_ANDROID_REPO }} \
            -p "libmpv-release.aar" \
            -D third-party/mpv/android/ --clobber

          echo "=== Downloads complete ==="
          find third-party/mpv -type f -exec ls -lh {} \;
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract Windows x64
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          cd third-party/mpv/windows-x64
          7z x *.7z -aoa
          python3 -c "
          import subprocess
          out = subprocess.check_output(['objdump', '-p', 'libmpv-2.dll'], text=True)
          exports = [l.split()[-1] for l in out.splitlines() if 'mpv_' in l]
          with open('libmpv-2.def', 'w') as f:
              f.write('LIBRARY libmpv-2.dll\nEXPORTS\n')
              for e in exports: f.write(f'  {e}\n')
          print(f'{len(exports)} exports')
          "
          dlltool -d libmpv-2.def -l mpv.lib -D libmpv-2.dll

      - name: Extract Windows ARM64
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          cd third-party/mpv/windows-arm64
          7z x *.7z -aoa

      - name: Extract macOS
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          cd third-party/mpv/macos-universal
          tar xzf *.tar.gz

      - name: Extract iOS
        if: steps.cache-mpv.outputs.cache-hit != 'true'
        run: |
          cd third-party/mpv/ios-arm64
          tar xzf *.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: libmpv-all-platforms
          path: third-party/mpv/
          retention-days: 7

  # =================================================================
  # === Lint & Test ==================================================
  # =================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v3-rust-slint

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev pkg-config

      - name: Format check
        run: cargo fmt --all --check
        working-directory: rust

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: rust

      - name: Tests
        run: cargo test --workspace
        working-directory: rust

  # =================================================================
  # === Build Windows ================================================
  # =================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v3-rust-slint

      - uses: actions/download-artifact@v4
        with:
          name: libmpv-all-platforms
          path: third-party/mpv/

      - name: Build
        run: cargo build -p crispy-ui --release
        working-directory: rust

      - name: Bundle DLL
        shell: bash
        run: cp third-party/mpv/windows-x64/libmpv-2.dll rust/target/release/

      - uses: actions/upload-artifact@v4
        with:
          name: crispy-windows-x64
          path: |
            rust/target/release/crispy-ui.exe
            rust/target/release/libmpv-2.dll
          retention-days: 7

  # =================================================================
  # === Build Linux ==================================================
  # =================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v3-rust-slint

      - name: Install Linux deps
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev pkg-config

      - name: Build
        run: cargo build -p crispy-ui --release
        working-directory: rust

      - uses: actions/upload-artifact@v4
        with:
          name: crispy-linux-x64
          path: rust/target/release/crispy-ui
          retention-days: 7

  # =================================================================
  # === Build macOS ==================================================
  # =================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: deps
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v3-rust-slint

      - uses: actions/download-artifact@v4
        with:
          name: libmpv-all-platforms
          path: third-party/mpv/

      - name: Build
        run: cargo build -p crispy-ui --release
        working-directory: rust

      - uses: actions/upload-artifact@v4
        with:
          name: crispy-macos-universal
          path: rust/target/release/crispy-ui
          retention-days: 7

  # =================================================================
  # === Build Server =================================================
  # =================================================================
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          prefix-key: v3-rust-slint

      - name: Build
        run: cargo build -p crispy-server --release --bin crispy-server-standalone
        working-directory: rust

      - uses: actions/upload-artifact@v4
        with:
          name: crispy-server-linux
          path: rust/target/release/crispy-server-standalone
          retention-days: 7
