plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def signingValue = { propertyName, envName ->
    keystoreProperties.getProperty(propertyName) ?: System.getenv(envName)
}

def releaseStoreFile = signingValue('storeFile', 'CRISPY_ANDROID_STORE_FILE')
def releaseStorePassword = signingValue('storePassword', 'CRISPY_ANDROID_STORE_PASSWORD')
def releaseKeyAlias = signingValue('keyAlias', 'CRISPY_ANDROID_KEY_ALIAS')
def releaseKeyPassword = signingValue('keyPassword', 'CRISPY_ANDROID_KEY_PASSWORD')
def hasReleaseSigning = [
    releaseStoreFile,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { it != null && it.toString().trim() }

android {
    namespace = "com.crispytivi.crispy_tivi"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // Application ID is project-owned; keep it stable for installed app upgrades.
        applicationId = "com.crispytivi.crispy_tivi"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        testInstrumentationRunner = "pl.leancode.patrol.PatrolJUnitRunner"
        testInstrumentationRunnerArguments clearPackageData: 'true'
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Media3 ExoPlayer for HDR playback (SurfaceView + hardware compositor)
    implementation 'androidx.media3:media3-exoplayer:1.6.0'
    implementation 'androidx.media3:media3-exoplayer-hls:1.6.0'
    implementation 'androidx.media3:media3-exoplayer-dash:1.6.0'
    implementation 'androidx.media3:media3-ui:1.6.0'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

// === Rust FFI Library (crispy-ffi) ===
// Cross-compile Rust for Android ABIs using cargo-ndk.
// Prerequisites: cargo install cargo-ndk
//   rustup target add aarch64-linux-android
//   rustup target add armv7-linux-androideabi
//   rustup target add x86_64-linux-android

def rustDir = file("${projectDir}/../../../../rust")
def jniLibsDir = file("${projectDir}/src/main/jniLibs")

// Map Android ABI to Rust target triple.
def abiToTarget = [
    "arm64-v8a"  : "aarch64-linux-android",
    "armeabi-v7a": "armv7-linux-androideabi",
    "x86_64"     : "x86_64-linux-android",
]

// Build Rust for each Android ABI.
task buildRustAndroid {
    doLast {
        abiToTarget.each { abi, target ->
            exec {
                workingDir rustDir
                commandLine "cargo", "ndk",
                    "-t", target,
                    "-o", "${jniLibsDir}",
                    "build", "-p", "crispy-ffi",
                    "--release"
            }
        }
    }
}

// Ensure Rust builds before merging native libs.
tasks.whenTaskAdded { task ->
    if (task.name.contains("merge") &&
        task.name.contains("NativeLibs")) {
        task.dependsOn buildRustAndroid
    }
}
