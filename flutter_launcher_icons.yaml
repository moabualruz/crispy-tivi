flutter_launcher_icons:
  # Default fallback for non-adaptive contexts — boxed icon with dark bg.
  image_path: "assets/logo_path2_grayscale.png"

  # ── Android ────────────────────────────────────────────
  android: "launcher_icon"
  # Adaptive icon: transparent logo on dark solid background.
  adaptive_icon_background: "#2D3135"
  adaptive_icon_foreground: "assets/logo_path2_nobox_silver.png"

  # ── iOS ────────────────────────────────────────────────
  ios: true
  remove_alpha_ios: true
  # iOS requires no transparency — fullbleed dark bg variant.
  image_path_ios: "assets/logo_path2_ios_fullbleed.png"

  # ── Web ────────────────────────────────────────────────
  web:
    generate: true
    image_path: "assets/logo_path2_grayscale.png"
    background_color: "#2D3135"
    theme_color: "#2D3135"

  # ── Windows ────────────────────────────────────────────
  windows:
    generate: true
    image_path: "assets/logo_path2_grayscale.png"
    icon_size: 256

  # ── macOS ──────────────────────────────────────────────
  macos:
    generate: true
    # macOS applies its own squircle mask — use fullbleed.
    image_path: "assets/logo_path2_ios_fullbleed.png"

  # ── Linux ──────────────────────────────────────────────
  linux:
    generate: true
    image_path: "assets/logo_path2_grayscale.png"
