name: crispy_tivi
description: >
  A convergent cross-platform media streaming application
  supporting IPTV, Jellyfin, Emby, and Plex.
publish_to: "none"
version: 0.1.0-alpha

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  collection: ^1.19.0

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Video Engine (DO NOT use video_player)
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Cloud Storage
  webdav_client: ^1.2.2
  dartssh2: ^2.8.3

  # Routing
  go_router: ^17.1.0

  # UI & Animation
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.1

  # Config & Serialization
  json_annotation: ^4.9.0
  path_provider: ^2.1.5

  web: ^1.1.0
  floating: ^6.0.0
  window_manager: ^0.5.1
  flutter_displaymode: ^0.7.0
  equatable: ^2.0.8
  universal_io: ^2.3.1
  file: ^7.0.1

  # Windows Platform APIs (FFI)
  ffi: ^2.1.3

  # Preferences
  shared_preferences: ^2.3.3

  # Casting (Google Cast / Chromecast)
  multicast_dns: ^0.3.2+6
  protobuf: ^6.0.0

  # Backup / File Operations
  file_picker: ^9.2.1
  share_plus: ^11.0.0

  # Crypto (SHA-256 for stable watch-history IDs in WsBackend fallback)
  crypto: ^3.0.0

  # Cloud Sync (Google Drive)
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0
  connectivity_plus: ^6.0.5

  # Wakelock (prevent screen sleep during playback)
  wakelock_plus: ^1.2.8

  # Audio session management (interruption handling on iOS/Android)
  audio_session: ^0.2.2

  # Voice Search
  # speech_to_text is broken on Windows (C++ MSVC linker error identifier not found)
  # speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # External Player (launch in VLC, MX Player, etc.)
  url_launcher: ^6.3.1
  flutter_rust_bridge: 2.11.1
  web_socket_channel: ^3.0.3
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  json_serializable: ^6.9.0
  retrofit_generator: ^10.2.1
  # Testing
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1
  fake_async: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/config/
    - assets/shaders/
