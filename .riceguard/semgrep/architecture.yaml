# Semgrep architecture rules for crispy-tivi
# Reference: https://semgrep.dev/docs/writing-rules/rule-syntax/

rules:
  - id: crispy-tivi-no-direct-db-in-controller
    patterns:
      - pattern: |
          $DB.$QUERY(...)
    message: "Direct database access in controller layer violates clean architecture."
    languages:
      - dart
    severity: WARNING
    metadata:
      category: architecture
      confidence: LOW
